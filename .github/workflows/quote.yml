name: 📖 نقل‌قول غمگین - هر ۱ ساعت

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install python-telegram-bot requests beautifulsoup4
      - name: Send quote
        env:
          BOT_TOKEN:  ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python quote_bot.py
